services:
  npm:
    image: jlesage/nginx-proxy-manager
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "${NPM_HTTPS}:${BOX_HTTPS}"
      - "${NPM_ADMIN}:${NPM_ADMIN}"
    volumes:
      - ${NPM_VOLUME}:/config:rw
    networks:
      - proxy

  db:
    image: postgres:16
    container_name: ${DB_CONTAINER}
    ports:
      - "${DB_PORT}:${DB_PORT}" 
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d instant-jobs"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${BACKEND_CONTAINER}
    ports: 
      - "${API_PORT}:${API_PORT}"
    networks:
      - proxy
    depends_on:
      db: 
          condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - FRONTEND_PORT=${FRONTEND_PORT}
    container_name: ${FRONTEND_CONTAINER}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    networks:
      - proxy
    depends_on:
      - backend

  adminer:
    image: adminer:5.4.2
    container_name: ${ADMINER_CONTAINER}
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT}:${ADMINER_PORT}"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
    external: true
